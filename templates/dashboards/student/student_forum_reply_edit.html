{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Respuesta - HSE Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-full flex overflow-hidden bg-[#f5f7fa] text-gray-900">

    {% include 'dashboards/student/_student_sidebar.html' %}

    <div class="main-content flex flex-col flex-1 w-0 overflow-hidden">
        <div class="header-topbar relative z-10 flex-shrink-0 flex h-14 items-center px-4 md:px-6 justify-between bg-white border-b border-gray-200">
            <div class="flex items-center space-x-2 md:space-x-3">
                <button onclick="window.toggleMobileSidebar()" class="md:hidden text-gray-500 hover:text-[#38657f] focus:outline-none mr-2"><i class="fa-solid fa-bars text-lg"></i></button>
                <nav class="breadcrumb-nav flex items-center text-sm text-gray-400 space-x-1.5">
                    <a href="{% url 'student_dashboard' %}" class="hover:text-[#38657f] font-medium">Mi Tablero</a>
                    <i class="fa-solid fa-chevron-right text-[9px]"></i>
                    <a href="{% url 'student_course_home' course_id=course.id %}" class="hover:text-[#38657f] font-medium truncate max-w-[120px]">{{ course.title }}</a>
                    <i class="fa-solid fa-chevron-right text-[9px]"></i>
                    <a href="{% url 'student_course_modules' course_id=course.id %}" class="hover:text-[#38657f] font-medium">Módulos</a>
                    <i class="fa-solid fa-chevron-right text-[9px]"></i>
                    <a href="{% url 'student_forum_detail' forum_id=forum.id %}" class="hover:text-[#38657f] font-medium truncate max-w-[150px]">Foro: {{ forum.title }}</a>
                    <i class="fa-solid fa-chevron-right text-[9px]"></i>
                    <span class="text-gray-700 font-semibold truncate max-w-[150px]">Editar</span>
                </nav>
            </div>
            <form action="{% url 'logout' %}" method="POST" class="inline">{% csrf_token %}<button type="submit" class="inline-flex items-center px-3 py-1.5 border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all cursor-pointer"><i class="fa-solid fa-arrow-right-from-bracket mr-1.5"></i> Salir</button></form>
        </div>

        <main class="flex-1 relative overflow-y-auto focus:outline-none p-6">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white shadow-sm border border-gray-300 p-6 mb-8 border-t-4 border-t-[#38657f]">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-pen text-[#38657f]"></i> Editar Respuesta</h3>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Tu mensaje</label>
                            {{ form.content }}
                            {{ form.media }}
                        </div>
                        <div class="flex justify-end gap-2">
                            <a href="{% url 'student_forum_detail' forum_id=forum.id %}" class="inline-flex items-center px-4 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors font-semibold text-sm rounded-sm">Cancelar</a>
                            <button type="submit" class="inline-flex items-center px-5 py-2 bg-[#1B5E37] text-white hover:bg-[#134529] transition-colors font-bold text-sm shadow-sm rounded-sm">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
