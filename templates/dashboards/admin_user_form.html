{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
    <title>{{ action }} Usuario - HSE Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="{% static 'images/logo.jpeg' %}">
</head>
<body class="bg-gray-50 p-6 sm:p-12">
    
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        
        <div class="bg-[#2b3494] px-6 py-4 flex items-center justify-between">
            <h2 class="text-lg font-bold text-white"><i class="fa-solid fa-user-plus mr-2"></i> {{ action }} Cuenta de Usuario</h2>
            <a href="{% url 'admin_user_list' %}" class="text-white hover:text-gray-200 text-sm font-medium"><i class="fa-solid fa-xmark text-lg"></i></a>
        </div>

        <form method="POST" class="p-6 sm:p-8 space-y-5">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                {% for field in form %}
                <div class="{% if field.name == 'email' or field.name == 'password' or field.name == 'is_active' %}sm:col-span-2{% endif %}">
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}<p class="text-[10px] text-gray-400 mt-1">{{ field.help_text }}</p>{% endif %}
                    {% if field.errors %}<p class="text-xs text-red-500 mt-1 font-medium">{{ field.errors.0 }}</p>{% endif %}
                </div>
                {% endfor %}
            </div>

            <div class="pt-6 border-t border-gray-100 flex justify-end space-x-3">
                <a href="{% url 'admin_user_list' %}" class="px-5 py-2.5 border border-gray-300 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition-colors">Cancelar</a>
                <button type="submit" class="px-5 py-2.5 bg-[#2b3494] text-white text-sm font-semibold rounded-xl hover:bg-[#1e246b] transition-colors shadow-md">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>

</body>
</html>
